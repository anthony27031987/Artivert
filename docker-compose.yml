version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: artivert-db
    environment:
      POSTGRES_USER: artivert_user
      POSTGRES_PASSWORD: artivert_password_secure_123
      POSTGRES_DB: artivert_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - artivert-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artivert_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artivert-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://artivert_user:artivert_password_secure_123@db:5432/artivert_db
      JWT_SECRET: your_jwt_secret_key_change_me_in_production
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - artivert-network
    command: npm run dev
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: artivert-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    volumes:
      - ./frontend/src:/app/src
    networks:
      - artivert-network
    command: npm run dev
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  artivert-network:
    driver: bridge
